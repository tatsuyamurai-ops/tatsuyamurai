function run(){

  setSt("ld","Claude AIが全"+wk.members.length+"名の週報を解析中...");
  document.getElementById("res").className="res";
  var lines=wk.members.map(function(m){return m.n+"|今期:"+(m.t.length?m.t.join(" / "):"なし")+"|来期:"+(m.x.length?m.x.join(" / "):"なし")+"|行動量:"+m.a;}).join("\n");

  .then(function(d){
    var raw="";
    if(d.content){for(var i=0;i<d.content.length;i++){if(d.content[i].type==="text"){raw=d.content[i].text;break;}}}
    if(!raw)throw new Error("空のレスポンス:"+JSON.stringify(d).substring(0,200));
    raw=raw.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();

    document.getElementById("ts").textContent="更新: "+new Date().toLocaleTimeString("ja-JP");
  })
  .catch(function(e){setSt("er","エラー: "+e.message);console.error(e);})
  .finally(function(){btn.disabled=false;btn.textContent="▶ サマリー生成";});
}
function render(s,lbl){
  document.getElementById("wklbl").textContent=lbl+" Weekly Report サマリー";
  rT("tbody","tcnt",s.today_topics||[]);rT("nbody","ncnt",s.next_topics||[]);rA(s.activity||[]);bC(s,lbl);
}
function rT(bid,cid,items){
  document.getElementById(cid).textContent=items.length+"社";
  if(!items.length){document.getElementById(bid).innerHTML='<div class="emp">該当なし</div>';return;}
  var h="";
  for(var i=0;i<items.length;i++){var t=items[i],bl="";for(var j=0;j<(t.bullets||[]).length;j++){bl+="<li>"+e(t.bullets[j])+"</li>";}h+='<div class="ci"><div class="cihd"><span class="cnm">'+e(t.customer)+'</span><span class="rp">'+e(t.rep)+'</span></div><ul class="bul">'+bl+"</ul></div>";}
  document.getElementById(bid).innerHTML=h;
}
function rA(act){
  document.getElementById("mcnt").textContent=act.length+"名";
  if(!act.length){document.getElementById("abody").innerHTML='<div class="emp">データなし</div>';return;}
  var tT=0,tq=0,nq=0,ex=0;for(var i=0;i<act.length;i++){tT+=act[i].total||0;tq+=act[i].today_q||0;nq+=act[i].next_q||0;ex+=act[i].explore||0;}
  var rows="";for(var i=0;i<act.length;i++){var a=act[i];rows+='<tr><td>'+e(a.rep)+'</td><td><div class="bkd"><span class="bki"><span class="dot tq"></span>'+(a.today_q||0)+'</span><span class="dv">/</span><span class="bki"><span class="dot nq"></span>'+(a.next_q||0)+'</span><span class="dv">/</span><span class="bki"><span class="dot ex"></span>'+(a.explore||0)+'</span></div></td><td style="text-align:center"><div class="nb">'+(a.total||0)+"</div></td></tr>";}
  rows+='<tr class="tmr"><td>チーム合計</td><td><div class="bkd"><span class="bki"><span class="dot tq"></span>'+tq+'</span><span class="dv">/</span><span class="bki"><span class="dot nq"></span>'+nq+'</span><span class="dv">/</span><span class="bki"><span class="dot ex"></span>'+ex+'</span></div></td><td style="text-align:center"><div class="nb tot">'+tT+"</div></td></tr>";
  document.getElementById("abody").innerHTML='<table><thead><tr><th>担当者</th><th>内訳（<span style="color:var(--ac)">今期</span> / <span style="color:var(--ac2)">来期</span> / <span style="color:var(--tx3)">探索</span>）</th><th style="text-align:center">合計</th></tr></thead><tbody>'+rows+"</tbody></table>";
}
function bC(s,lbl){
  var t="【"+lbl+" 週報サマリー｜ENT FS 村井チーム】\n生成: "+new Date().toLocaleString("ja-JP")+"\n\n";
  t+="━━━ 今期 顧客別Topics ━━━\n";(s.today_topics||[]).forEach(function(x){t+="\n■ "+x.customer+"（"+x.rep+"）\n";(x.bullets||[]).forEach(function(b){t+="  • "+b+"\n";});});
  t+="\n━━━ 来期 顧客別Topics ━━━\n";(s.next_topics||[]).forEach(function(x){t+="\n■ "+x.customer+"（"+x.rep+"）\n";(x.bullets||[]).forEach(function(b){t+="  • "+b+"\n";});});
  t+="\n━━━ 行動量（今期/来期/探索） ━━━\n";(s.activity||[]).forEach(function(a){t+=a.rep+": "+a.total+"件（今期"+a.today_q+", 来期"+a.next_q+", 探索"+a.explore+"）\n";});
  CT=t;
}
function copyAll(){
  if(!CT)return;var btn=document.getElementById("cpbtn");
  navigator.clipboard&&navigator.clipboard.writeText(CT).then(function(){btn.textContent="✅ コピーしました";setTimeout(function(){btn.textContent="📋 全文コピー";},2000);});
}
function setSt(t,m){document.getElementById("sbar").className="sbar "+t;document.getElementById("smsg").textContent=m;}
function e(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
</script>
